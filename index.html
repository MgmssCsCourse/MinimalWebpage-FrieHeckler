<h1>Weihnachten in Island</h1>

<p>In Island ist es zu Weihnachten sehr kalt und oft dunkel. Schnee sorgt für eine besondere Stimmung.</p>

<h2>Traditionen</h2>
<p>Es gibt 13 Weihnachtsmänner, die „Jólasveinar“. Sie bringen den Kindern kleine Geschenke.</p>

<h2>Essen</h2>
<ul>

    <li>Fisch</li>

</ul>

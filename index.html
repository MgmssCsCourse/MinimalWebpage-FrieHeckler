<h1>Weihnachten in Island</h1>



<section>
    <h2>Winteraktivitäten</h2>
    <ul>
        <li>Nordlichter beobachten</li>
        <li>Gletscherwanderungen</li>
        <li>Eishöhlen erkunden</li>
        <li>Snowmobil fahren</li>
        <li>Heiße Quellen genießen</li>
    </ul>
</section>

<section>
    <h2>Tageslicht im Winter</h2>
    <p>Im Winter gibt es auf Island nur 4–5 Stunden Tageslicht. Dafür sind Sonnenaufgänge und Sonnenuntergänge besonders schön.</p>
</section>

<section>
    <h2>Typische Tiere</h2>
    <ul>
        <li>Islandpferde</li>
        <li>Polarfüchse</li>
        <li>Seevögel</li>
    </ul>
</section>

<section>
    <h2>Sicherheitstipps</h2>
    <ul>
        <li>Wetter prüfen</li>
        <li>Warme Kleidung tragen</li>
        <li>Vorsicht bei Eis</li>
        <li>Geführte Touren nutzen</li>
    </ul>
</section>

<section>
    <h2>Besondere Natur</h2>
    <p>Gefrorene Wasserfälle, schneebedeckte Landschaften und Nordlichter machen Island im Winter einzigartig.</p>
</section>

<section>
    <h2>Weihnachten in Island</h2>
    <p>Es ist kalt und dunkel, aber sehr gemütlich. Die 13 „Jólasveinar“ bringen Geschenke.</p>

    <h3>Essen</h3>
    <ul>
